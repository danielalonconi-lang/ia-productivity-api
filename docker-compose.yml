services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-productivity_ia}
      POSTGRES_USER: ${POSTGRES_USER:-productivity_ia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-productivity_ia}
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - productivity_ia_net

volumes:
  postgres_data:

networks:
  productivity_ia_net:
    driver: bridge